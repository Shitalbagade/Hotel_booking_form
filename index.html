<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Palace - 5 Star Booking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
    <div class="overlay">
        <h1>Royal Palace Hotel ⭐⭐⭐⭐⭐</h1>
        
    </div>
</section>

<section class="form-section">
<div class="form-container">
<h2>Book Your Luxury Stay</h2>

<form action="https://formsubmit.co/shitalbagade2005@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New 5-Star Hotel Booking!">

<div class="row">
<div class="form-group">
<label>Full Name *</label>
<input type="text" name="Full Name" required>
</div>

<div class="form-group">
<label>Email *</label>
<input type="email" name="Email" required>
</div>
</div>

<div class="row">
<div class="form-group">
<label>Phone *</label>
<input type="tel" name="Phone" required>
</div>

<div class="form-group">
<label>City *</label>
<input type="text" name="City" required>
</div>
</div>

<div class="row">
<div class="form-group">
<label>Check-in Date *</label>
<input type="date" name="Check-in Date" required>
</div>

<div class="form-group">
<label>Check-out Date *</label>
<input type="date" name="Check-out Date" required>
</div>
</div>

<div class="row">
<div class="form-group">
<label>Room Category *</label>
<select name="Room Category" required>
<option value="">Select Room</option>
<option>Deluxe Room</option>
<option>Executive Room</option>
<option>Presidential Suite</option>
</select>
</div>

<div class="form-group">
<label>Room Type *</label>
<select name="Room Type" required>
<option value="">Select</option>
<option>AC Room</option>
<option>Non-AC Room</option>
</select>
</div>
</div>

<div class="row">
<div class="form-group">
<label>Adults *</label>
<input type="number" name="Adults" min="1" required>
</div>

<div class="form-group">
<label>Children</label>
<input type="number" name="Children" min="0">
</div>
</div>

<div class="form-group">
<label>Meal Plan *</label>
<select name="Meal Plan" required>
<option value="">Select Meal Plan</option>
<option>Breakfast Only</option>
<option>Half Board</option>
<option>Full Board</option>
<option>All Inclusive</option>
</select>
</div>

<div class="form-group">
<label>Additional Services</label>
<div class="checkbox-group">
<label><input type="checkbox" name="Airport Pickup" value="Yes"> Airport Pickup</label>
<label><input type="checkbox" name="Spa Access" value="Yes"> Spa Access</label>
<label><input type="checkbox" name="Pool Access" value="Yes"> Swimming Pool Access</label>
<label><input type="checkbox" name="Gym Access" value="Yes"> Gym Access</label>
</div>
</div>

<div class="form-group">
<label>Special Requests</label>
<textarea name="Special Requests" rows="3"></textarea>
</div>

<button type="submit" class="btn">Confirm Luxury Booking</button>

</form>
</div>
</section>

<script src="script.js"></script>
</body>
</html>
